<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Recipe Library</title>
<style>
:root{
  --bg:#f9f7f4;--card:#fff;--accent1:#e8824a;--accent2:#3d7ebf;
  --text:#1a1a1a;--muted:#6b6b6b;--border:#e5e0d8;--green:#4caf7d;--tag-bg:#f0ede8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── LIBRARY VIEW ── */
.library-header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:48px 32px 36px;text-align:center;}
.library-header .eyebrow{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:10px;}
.library-header h1{font-size:clamp(24px,5vw,36px);font-weight:700;letter-spacing:-.5px;}
.library-header p{margin-top:8px;font-size:14px;color:rgba(255,255,255,.55);}
.search-wrap{max-width:460px;margin:22px auto 0;position:relative;}
.search-wrap input{width:100%;padding:12px 16px 12px 42px;border-radius:12px;border:none;font-size:14px;background:rgba(255,255,255,.12);color:#fff;outline:none;backdrop-filter:blur(4px);}
.search-wrap input::placeholder{color:rgba(255,255,255,.4);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.5;}

.filter-bar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:20px 20px 4px;}
.filter-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .18s;}
.filter-btn.active{background:var(--text);color:#fff;border-color:var(--text);}

.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;padding:16px 24px 48px;max-width:1100px;margin:0 auto;}

.recipe-card{background:var(--card);border-radius:18px;border:1px solid var(--border);cursor:pointer;transition:transform .18s,box-shadow .18s;overflow:hidden;}
.recipe-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.09);}
.card-thumb{height:140px;display:flex;align-items:center;justify-content:center;font-size:52px;position:relative;}
.card-meal-badge{position:absolute;top:12px;left:12px;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;font-weight:700;padding:3px 9px;border-radius:4px;}
.card-meal-badge.lunch{background:#fff3ea;color:var(--accent1);}
.card-meal-badge.dinner{background:#eaf2fb;color:var(--accent2);}
.card-body{padding:16px 18px 18px;}
.card-body h3{font-size:16px;font-weight:700;margin-bottom:5px;line-height:1.3;}
.card-body p{font-size:13px;color:var(--muted);line-height:1.45;margin-bottom:14px;}
.card-stats{display:flex;gap:8px;flex-wrap:wrap;}
.card-stat{font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;background:var(--tag-bg);color:var(--muted);}
.card-stat.hi{color:var(--green);}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.card-tag{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--tag-bg);color:var(--muted);font-weight:500;}

/* ── DETAIL VIEW ── */
.detail-view{display:none;max-width:700px;margin:0 auto;padding:0 0 80px;}
.detail-view.open{display:block;}

.back-btn{display:flex;align-items:center;gap:8px;padding:18px 20px 0;background:none;border:none;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);transition:color .15s;}
.back-btn:hover{color:var(--text);}

.hero-card{background:var(--card);border-radius:20px;padding:28px;border:1px solid var(--border);margin:16px 20px 16px;}
.meal-badge{display:inline-block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;padding:4px 10px;border-radius:4px;margin-bottom:12px;}
.meal-badge.lunch{background:#fff3ea;color:var(--accent1);}
.meal-badge.dinner{background:#eaf2fb;color:var(--accent2);}
.hero-card h2{font-size:clamp(20px,4vw,26px);font-weight:700;letter-spacing:-.3px;margin-bottom:8px;}
.hero-card .desc{color:var(--muted);font-size:15px;line-height:1.55;margin-bottom:20px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:8px;}
.stat{text-align:center;background:var(--tag-bg);border-radius:12px;padding:12px 8px;}
.stat .val{font-size:20px;font-weight:700;}
.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.stat.protein .val{color:#c0392b;}
.stat.fiber .val{color:var(--green);}
.stat.kcal .val{color:#e67e22;}
.stat.time .val{color:var(--accent2);}
.meta-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
.meta-tag{background:var(--tag-bg);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--muted);font-weight:500;}

.section-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:22px;margin:0 20px 16px;}
.section-card h3{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.servings-control{display:flex;align-items:center;gap:14px;margin-bottom:20px;background:var(--tag-bg);border-radius:12px;padding:12px 16px;}
.servings-control label{font-size:14px;font-weight:600;flex:1;}
.servings-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(--card);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.1);transition:transform .1s;line-height:1;}
.servings-btn:hover{transform:scale(1.1);}
.servings-count{font-size:18px;font-weight:700;min-width:20px;text-align:center;}
.ingredient-list{list-style:none;}
.ingredient-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:15px;}
.ingredient-item:last-child{border-bottom:none;}
.ingredient-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}
.ingredient-item.checked .ingredient-name{text-decoration:line-through;color:var(--muted);}
.ingredient-amount{font-weight:600;min-width:90px;}
.ingredient-name{flex:1;}
.ingredient-cat{font-size:10px;background:var(--tag-bg);padding:2px 7px;border-radius:4px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.steps-list{list-style:none;}
.step{display:flex;gap:16px;padding:14px 0;border-bottom:1px solid var(--border);}
.step:last-child{border-bottom:none;}
.step-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-top:2px;}
.lunch-detail .step-num{background:#fff3ea;color:var(--accent1);}
.dinner-detail .step-num{background:#eaf2fb;color:var(--accent2);}
.step-text{font-size:15px;line-height:1.6;}
.step-tip{display:inline-block;margin-top:6px;font-size:12px;color:var(--muted);background:var(--tag-bg);padding:3px 10px;border-radius:4px;}
.prep-tip-list{list-style:none;}
.prep-tip-item{display:flex;gap:10px;padding:8px 0;font-size:14px;color:var(--muted);border-bottom:1px solid var(--border);}
.prep-tip-item:last-child{border-bottom:none;}
.prep-tip-item::before{content:"💡";flex-shrink:0;}
.progress-bar-wrap{margin-top:10px;background:var(--border);border-radius:4px;height:6px;overflow:hidden;}
.progress-bar{height:100%;border-radius:4px;background:var(--green);transition:width .3s;}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state .icon{font-size:40px;margin-bottom:12px;}

@media(max-width:500px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .hero-card h2{font-size:20px;}
  .recipe-grid{padding:12px 14px 48px;}
}
</style>
</head>
<body>

<!-- ═══════════ LIBRARY VIEW ═══════════ -->
<div id="library-view">
  <div class="library-header">
    <div class="eyebrow">Recipe Library</div>
    <h1>🍽️ My Meal Prep Recipes</h1>
    <p>High protein · High fiber · Batch-cook ready</p>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search recipes…" oninput="filterRecipes()"/>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('lunch',this)">☀️ Lunch</button>
    <button class="filter-btn" onclick="setFilter('dinner',this)">🌙 Dinner</button>
    <button class="filter-btn" onclick="setFilter('chicken',this)">🐔 Chicken</button>
    <button class="filter-btn" onclick="setFilter('fish',this)">🐟 Fish</button>
    <button class="filter-btn" onclick="setFilter('beef',this)">🥩 Beef</button>
  </div>

  <div class="recipe-grid" id="recipe-grid"></div>
</div>

<!-- ═══════════ DETAIL VIEW ═══════════ -->
<div id="detail-view" class="detail-view">
  <button class="back-btn" onclick="showLibrary()">← Back to library</button>
  <div id="detail-content"></div>
</div>

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let currentFilter = "all";
let currentSearch = "";
let servings = {};
let checked = {};

RECIPES.forEach(r => {
  servings[r.id] = 5;
  checked[r.id] = new Set();
});

// ═══════════════════════════════════════════════════════════
// LIBRARY
// ═══════════════════════════════════════════════════════════
function filterRecipes() {
  currentSearch = document.getElementById("search-input").value.toLowerCase();
  renderGrid();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById("recipe-grid");
  const filtered = RECIPES.filter(r => {
    const matchFilter = currentFilter === "all" || r.meal === currentFilter || r.tags.map(t=>t.toLowerCase()).includes(currentFilter);
    const matchSearch = !currentSearch || r.name.toLowerCase().includes(currentSearch) || r.tags.some(t => t.toLowerCase().includes(currentSearch));
    return matchFilter && matchSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🍽️</div><p>No recipes match your search.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(r => `
    <div class="recipe-card" onclick="openRecipe('${r.id}')">
      <div class="card-thumb" style="background:${r.thumbBg}">
        <span>${r.emoji}</span>
        <span class="card-meal-badge ${r.meal}">${r.meal === 'lunch' ? '☀️ Lunch' : '🌙 Dinner'}</span>
      </div>
      <div class="card-body">
        <h3>${r.name}</h3>
        <p>${r.description}</p>
        <div class="card-stats">
          <span class="card-stat">${r.calories} cal</span>
          <span class="card-stat hi">💪 ${r.protein}g protein</span>
          <span class="card-stat hi">🌿 ${r.fiber}g fiber</span>
          <span class="card-stat">⏱ ${r.time}</span>
        </div>
        <div class="card-tags">
          ${r.tags.filter(t=>!['chicken','fish','beef'].includes(t)).slice(0,3).map(t=>`<span class="card-tag">${t}</span>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════════
// DETAIL
// ═══════════════════════════════════════════════════════════

  const accentColor = r.meal === 'lunch' ? 'var(--accent1)' : 'var(--accent2)';

  document.getElementById("detail-content").innerHTML = `
    <div class="hero-card ${r.meal}-detail" style="margin-top:16px;">
      <div class="meal-badge ${r.meal}">${r.meal === 'lunch' ? '☀️ Lunch' : '🌙 Dinner'}</div>
      <h2>${r.name}</h2>
      <p class="desc">${r.description}</p>
      <div class="stats-row">
        <div class="stat kcal"><div class="val">${r.calories}</div><div class="lbl">Calories</div></div>

        <div class="stat fiber"><div class="val">${r.fiber}g</div><div class="lbl">Fiber</div></div>
        <div class="stat time"><div class="val">${r.time}</div><div class="lbl">Prep Time</div></div>
      </div>
      <div class="meta-tags">
        ${r.tags.filter(t=>!['chicken','fish','beef'].includes(t)).map(t=>`<span class="meta-tag">${t}</span>`).join('')}

    </div>

    <div class="section-card">
      <h3>🛒 Ingredients</h3>
      <div class="servings-control">
        <label>Servings (meal prep containers)</label>
        <button class="servings-btn" onclick="changeServings('${r.id}',-1)">−</button>
        <span class="servings-count" id="srv-${r.id}">${servings[r.id]}</span>
        <button class="servings-btn" onclick="changeServings('${r.id}',+1)">+</button>
      </div>
      <ul class="ingredient-list" id="ings-${r.id}"></ul>
    </div>

    <div class="section-card ${r.meal}-detail">

        ${r.steps.map((s,i) => `

    </div>

    <div class="section-card">

      <p style="font-size:13px;color:var(--muted);margin-bottom:12px;">Check off ingredients as you gather them:</p>

      <div class="progress-bar-wrap"><div class="progress-bar" id="prog-bar-${r.id}" style="width:0%"></div></div>
    </div>
  `;

  renderIngredients(r.id);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showLibrary() {
  document.getElementById("detail-view").className = "detail-view";
  document.getElementById("library-view").style.display = "block";
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════════
// INGREDIENTS / SERVINGS
// ═══════════════════════════════════════════════════════════
function formatAmt(amount, mult) {
  const val = amount * mult;
  if (val === 0) return "—";
  if (val % 1 === 0) return String(val);
  const frac = val % 1, whole = Math.floor(val);
  const fracs = {0.25:"¼",0.5:"½",0.75:"¾",0.33:"⅓",0.67:"⅔",0.125:"⅛",0.375:"⅜"};
  const fs = fracs[Math.round(frac*8)/8] || frac.toFixed(1);
  return whole > 0 ? `${whole} ${fs}` : fs;
}

function renderIngredients(id) {
  const r = RECIPES.find(x => x.id === id);
  const ul = document.getElementById(`ings-${id}`);
  if (!ul) return;
  const mult = servings[id] / r.baseServings;
  ul.innerHTML = '';
  r.ingredients.forEach((ing, i) => {
    const isChecked = checked[id].has(i);
    const li = document.createElement('li');
    li.className = `ingredient-item${isChecked ? ' checked' : ''}`;
    li.innerHTML = `
      <input type="checkbox" ${isChecked?'checked':''} onchange="toggleCheck('${id}',${i})"/>
      <span class="ingredient-amount">${formatAmt(ing.amount, mult)} ${ing.unit}</span>
      <span class="ingredient-name">${ing.name}</span>
      <span class="ingredient-cat">${ing.category}</span>`;
    ul.appendChild(li);
  });
  updateProgress(id, r.ingredients.length);
}

function toggleCheck(id, idx) {
  checked[id].has(idx) ? checked[id].delete(idx) : checked[id].add(idx);
  renderIngredients(id);
}

function updateProgress(id, total) {
  const n = checked[id].size, pct = total ? Math.round(n/total*100) : 0;
  const bar = document.getElementById(`prog-bar-${id}`);
  const lbl = document.getElementById(`prog-label-${id}`);
  if (bar) bar.style.width = pct + '%';
  if (lbl) lbl.textContent = `${n} / ${total} items checked`;
}

function changeServings(id, delta) {
  servings[id] = Math.max(1, servings[id] + delta);
  const el = document.getElementById(`srv-${id}`);
  if (el) el.textContent = servings[id];
  renderIngredients(id);
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
renderGrid();
